<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Aniku</title>
    <meta
      name="description"
      content="Aniku — 浏览器端番剧浏览、规则选源、弹幕与 Bangumi 追番"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Early theme paint before React — match aniku-settings localStorage
      try {
        var raw = localStorage.getItem('aniku-settings')
        var theme = 'dark'
        if (raw) {
          var parsed = JSON.parse(raw)
          if (parsed && (parsed.state?.theme === 'light' || parsed.theme === 'light')) {
            theme = 'light'
          } else if (parsed && (parsed.state?.theme === 'dark' || parsed.theme === 'dark')) {
            theme = 'dark'
          }
        }
        document.documentElement.setAttribute('data-theme', theme)
        document.documentElement.style.colorScheme = theme
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark')
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
